name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6:17am UTC
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          POD2TXT_API_KEY: ${{ secrets.POD2TXT_API_KEY }}
        run: |
          MODE="all"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          fi

          missing=0
          if [ "$MODE" = "all" ] || [ "$MODE" = "tweets-only" ]; then
            if [ -z "$X_BEARER_TOKEN" ]; then
              echo "::error title=Missing repository secret::X_BEARER_TOKEN is required for mode '$MODE'. Add it in Settings > Secrets and variables > Actions."
              missing=1
            fi
          fi
          if [ "$MODE" = "all" ] || [ "$MODE" = "podcasts-only" ]; then
            if [ -z "$POD2TXT_API_KEY" ]; then
              echo "::error title=Missing repository secret::POD2TXT_API_KEY is required for mode '$MODE'. Add it in Settings > Secrets and variables > Actions."
              missing=1
            fi
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [ "$MODE" != "all" ]; then
            cd scripts && node generate-feed.js --$MODE
          else
            cd scripts && node generate-feed.js
          fi

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
